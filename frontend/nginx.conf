# описание веб-сервера
server {
    # cлушаем порт 8080
    listen 8080;
    # включаем сжатие
    gzip on;
    # перечисление типов файлов, которые необходимо сжимать
    gzip_types text/css application/javascript image/svg+xml;
    # правила для запросов, которые начинаются с / (все)
    location / {
        # указываем путь, где мой фронт
        root /usr/share/nginx/html;
        # указываем, какой файл мы открываем первым
        index index.html;
        # ищи везде файл, если нет, то отдай index.html
        try_files $uri $uri/ /index.html;
        # сохраняем в кэш все файлы этих типов
        location ~* \.(?:png|jpg|jpeg|webp|svg|css|js)$ {
            expires 30d;                                    # хранит в кэше 30 дней
            add_header Cache-Control "public";              # можно кэшировать всем (браузер, промежуточные сервера)
        }
    }
    # прокси для бека (/api/)
    location /api/ {
        # переброс другому серверу
        proxy_pass http://auth_service:3001;
        # передаем информацию о домене/хосте
        proxy_set_header Host $host;
        # передаем информацию об айпи юзера
        proxy_set_header X-Real-IP $remote_addr;
        # передаем цепочку серверов
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
