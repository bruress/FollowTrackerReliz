services:
  db:
    env_file:
      - ./backend/auth_service/.env.production
    image: postgres:18-alpine
    restart: always
    container_name: pg_db_auth
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/auth_service/migrations:/docker-entrypoint-initdb.d
  auth_service:
    env_file: 
      - ./backend/auth_service/.env.production
    container_name: auth_service
    restart: always
    build: 
      context: ./backend/auth_service
    ports:
      - "3001:3001"
    depends_on:
      - db
  frontend:
    container_name: frontend
    env_file:
      - ./frontend/.env.production
    build: 
      context: ./frontend/
    restart: always
    ports:
      - "3080:8080"
volumes:
  postgres_data: 